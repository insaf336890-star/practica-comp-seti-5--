<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Размеры изображений</title>
</head>
<body>
    <h2>1. Оригинальный размер</h2>
    <img src="cat.png" alt="Котик оригинал">

    <h2>2. Ширина 300 пикселей</h2>
    <img src="cat.png" width="300" alt="Котик 300px">

    <h2>3. Ширина 150 пикселей</h2>
    <img src="cat.png" width="150" alt="Котик 150px">
</body>
</html>
