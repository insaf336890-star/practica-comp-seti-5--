<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стили границ (Пример 8)</title>
    <link rel="stylesheet" href="task8.css">
</head>
<body>
    <div class="border-box outset">One-colored border! Стиль границ - outset</div>
    <div class="border-box inset">Two-colored border! Стиль границ - inset</div>
    <div class="border-box groove">Three-colored border! Стиль границ - groove</div>
    <div class="border-box ridge">Four-colored border! Стиль границ - ridge</div>
    
    <p class="note"><strong>ПРИМЕЧАНИЕ:</strong> Свойство "border-color" не работает отдельно. Вначале укажите стиль границы border-style.</p>
</body>
