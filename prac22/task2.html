<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Задание 2</title>
</head>
<body>
    <h2> Поиск города</h2>
    <input type="text" id="cityInput" placeholder="Введите название города">
    <button id="searchBtn">Найти</button>
    <p id="res"></p>

    <script>
        let cities = ["Москва", "Санкт-Петербург", "Казань", "Новосибирск", "Екатеринбург"];
        let input = document.querySelector("#cityInput");
        let btn = document.querySelector("#searchBtn");
        let res = document.querySelector("#res");

      
        function findCity(searchName) {
            for (let i = 0; i < cities.length; i++) {
                
                if (cities[i].toLowerCase() === searchName.toLowerCase()) {
                    return true; 
                }
            }
            return false; 
        }

        btn.onclick = function() {
            let cityName = input.value.trim();

            if (cityName === "") {
                res.textContent = "Введите название города";
                return;
            }

            if (findCity(cityName)) {
                res.textContent = "Город найден";
            } else {
                res.textContent = "Город не найден";
            }
        };
    </script>
</body>
</html>
