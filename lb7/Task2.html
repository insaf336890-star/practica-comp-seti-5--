<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  table {
    border-collapse: collapse;
    width: 100%;
    text-align: center;
    font-family: Arial, sans-serif;
  }
  th, td {
    border: 1px solid black;
    padding: 10px;
  }
  /* Шапка таблицы */
  .header-row {
    background-color: #FF0000;
    color: white;
  }
  /* Левый столбец с названиями */
  .side-bar {
    background-color: #009999;
    color: white;
    width: 30%;
  }
</style>
</head>
<body>

<h3 style="text-align: center;">Добыча драгоценных камней (упрощенная)</h3>

<table>
  <tr class="header-row">
    <td></td>
    <th>2014</th>
    <th>2015</th>
    <th>2016</th>
  </tr>
  <tr>
    <th class="side-bar">Сапфиры</th>
    <td rowspan="2">10</td> 
    <td>20</td>
    <td>30</td>
  </tr>
  <tr>
    <th class="side-bar">Рубины</th>
    <td>40</td>
    <td>50</td>
  </tr>
  <tr>
    <th class="side-bar">Алмазы</th>
    <td>60</td>
    <td colspan="2">100</td> 
  </tr>
</table>

</body>
</html>
